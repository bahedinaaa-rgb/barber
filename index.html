<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <nav>
        <div class="container">
            <img src="./imges/barber-haircut-mascot-png.png" alt="fast-food-logo">
            <div class="row" id="nav-menu">
                <ul>
                  <li><a href="#home">Home</a></li>
                  <li><a href="#about">About</a></li>
                  <li><a href="#contact">Contact</a></li>
                  <li><a href="#menu">Menu</a></li>
                </ul>
            </div>
            <!-- Hamburger Button (only visible on mobile) -->
            <button class="menu-toggle" id="mobile-menu-toggle" aria-label="Open navigation menu">
                &#9776; <!-- Hamburger Icon -->
            </button>
        </div>
    </nav>
    
    <header id="home">
        <div class="container-header">
            
            <div class="row">
                <h1>BARBER</h1>
                <p>هنا نصنع تحفتك الفنية القادمة."</p>
                <a href="#book-appointment" class="btn btn-primary"> احجز الآن</a>
            </div>
        </div>
    </header>
    <main>
        <section id="about">
            <div class="container">
                <h2>About Us</h2>
                <p>"Berber: أكثر من مجرد حلاقة.. إنها تجربة استثنائية لإعادة تعريف أناقتك."</p>
            </div>
        </section>

        <section id="menu">
            <div class="container-menu">
                <div class="taitle">
                    <h1>MENU</h1>
            
                </div>
                <img src="./imges/68d4304fac4af177f3b3d827aeefb36b.jpg" alt="">
            </div>
        </section>

        <section id="book-appointment">
            <div class="container">
                <h2>احجز موعدك الآن</h2>
                <form action="mailto:barber@example.com" method="post" enctype="text/plain">
                    <input type="text" name="name" placeholder="Your Name" required>
                    <input type="email" name="email" placeholder="Your Email" required>
                    <input type="tel" name="phone" placeholder="Phone Number" required>
                    <input type="date" name="date" required>
                    <input type="time" name="time" required>
                    <button type="submit" class="btn btn-primary">احجز الآن</button>
                </form>
            </div>
        </section>

        <section id="contact">
            <div class="container">
                <h2>Contact Us</h2>
                <div class="contact-info">
                    <p><strong>Address:</strong> 123 عنوان</p>
                    <p><strong>Phone:</strong> +20 123 456 789</p>
                    <p><strong>Email:</strong> contact@fastfood.com</p>
                </div>
            </div>
        </section>

    <script>
        // Select the button and the menu by their IDs
        const menuButton = document.getElementById('mobile-menu-toggle');
        const navMenu = document.getElementById('nav-menu');

        // Add a click event listener to the button
        menuButton.addEventListener('click', () => {
            // Toggle the .active class on the menu container
            navMenu.classList.toggle('active');
        });
    </script>
</body>
</html>
